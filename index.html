<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>セルフレジ</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="セルフレジ"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f2f5;
      color: #1a1a1a;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      background: #1a5276;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; }
    .header-logo-icon {
      width: 32px; height: 32px;
      background: #f39c12;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-logo-text { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: 1px; }
    .header-logo-text span { color: #f39c12; }
    .header-time { font-size: 13px; color: rgba(255,255,255,0.7); font-variant-numeric: tabular-nums; }
    .header-lane { font-size: 12px; color: rgba(255,255,255,0.5); }

    .camera-section {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-bottom: 3px solid #1a5276;
    }
    .camera-header {
      background: #1a5276;
      padding: 8px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .camera-header-title { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .camera-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #2ecc71; font-weight: 600; }
    .status-dot { width: 7px; height: 7px; background: #2ecc71; border-radius: 50%; animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .camera-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 8/3;
      background: #000;
      overflow: hidden;
    }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    canvas#diffCanvas { display: none; }

    .scan-frame { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .scan-box { width: 120px; height: 120px; position: relative; }
    .scan-box::before, .scan-box::after, .scan-box .corner-bl, .scan-box .corner-br {
      content: ''; position: absolute; width: 22px; height: 22px; border-color: #f39c12; border-style: solid;
    }
    .scan-box::before { top:0; left:0; border-width:3px 0 0 3px; }
    .scan-box::after  { top:0; right:0; border-width:3px 3px 0 0; }
    .scan-box .corner-bl { bottom:0; left:0; border-width:0 0 3px 3px; }
    .scan-box .corner-br { bottom:0; right:0; border-width:0 3px 3px 0; }
    .scan-line {
      position: absolute; left:5%; width:90%; height:2px;
      background: linear-gradient(90deg, transparent, #f39c12, transparent);
      animation: scanMove 2s ease-in-out infinite;
    }
    @keyframes scanMove { 0%,100% { top:10%; opacity:0.4; } 50% { top:90%; opacity:1; } }

    .brightness-bar-wrap {
      position: absolute; bottom:8px; left:50%; transform: translateX(-50%);
      width:80px; display:flex; flex-direction:column; align-items:center; gap:3px; pointer-events:none;
    }
    .brightness-label { font-size:9px; color:rgba(255,255,255,0.5); letter-spacing:1px; text-transform:uppercase; }
    .brightness-bar { width:100%; height:3px; background:rgba(255,255,255,0.15); border-radius:2px; overflow:hidden; }
    .brightness-fill { height:100%; background:#f39c12; border-radius:2px; transition:width 0.1s; width:50%; }

    .flash { position:absolute; inset:0; background:rgba(243,156,18,0.4); opacity:0; transition:opacity 0.08s; pointer-events:none; }
    .flash.active { opacity:1; }

    .price-pop {
      position:absolute; top:20%; left:50%;
      transform:translateX(-50%) scale(0);
      background:#1a5276; color:#fff;
      font-size:22px; font-weight:900;
      padding:6px 18px; border-radius:6px;
      white-space:nowrap; pointer-events:none;
      opacity:0; z-index:10;
      transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .price-pop.show { transform:translateX(-50%) scale(1); opacity:1; }
    .price-pop.hide { transform:translateX(-50%) scale(0.8) translateY(-20px); opacity:0; }

    .main-panel { width: 100%; max-width: 480px; flex: 1; display: flex; flex-direction: column; }

    .total-section {
      background: #fff;
      padding: 16px 20px;
      border-bottom: 1px solid #e0e0e0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .total-label-text { font-size: 11px; color: #999; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
    .total-row { display: flex; align-items: baseline; gap: 6px; }
    .total-yen-sign { font-size: 20px; font-weight: 700; color: #1a5276; }
    .total-amount {
      font-size: 44px; font-weight: 900; color: #1a5276;
      letter-spacing: -2px; font-variant-numeric: tabular-nums;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    .total-amount.bump { transform: scale(1.12); }
    .tax-note { font-size: 11px; color: #bbb; margin-top: 2px; }
    .item-badge { background: #1a5276; color: #fff; border-radius: 8px; padding: 8px 16px; text-align: center; }
    .item-badge-num { font-size: 26px; font-weight: 900; line-height: 1; }
    .item-badge-label { font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 2px; }

    .checkout-section {
      background: #fff;
      padding: 12px 20px;
      display: flex; gap: 10px;
      border-bottom: 1px solid #e0e0e0;
    }
    .cancel-btn {
      flex: 1; background: #f0f0f0; color: #666; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 700; padding: 14px; cursor: pointer;
    }
    .checkout-btn {
      flex: 2; background: #e74c3c; color: #fff; border: none;
      border-radius: 10px; font-size: 17px; font-weight: 900; padding: 14px;
      cursor: pointer; letter-spacing: 1px;
      box-shadow: 0 4px 16px rgba(231,76,60,0.35);
      transition: transform 0.1s;
    }
    .checkout-btn:active { transform: scale(0.97); }

    .history-section { background: #fff; flex: 1; overflow-y: auto; }
    .history-header {
      display: grid; grid-template-columns: 1fr auto auto;
      padding: 8px 20px;
      background: #f7f8fa; border-bottom: 1px solid #e8e8e8;
      font-size: 11px; color: #999; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      position: sticky; top: 0;
    }
    .history-row {
      display: grid; grid-template-columns: 1fr auto auto;
      padding: 12px 20px; border-bottom: 1px solid #f0f0f0;
      align-items: center;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
    .history-row:last-child { border-bottom: none; }
    .row-name { font-size: 14px; color: #333; font-weight: 500; }
    .row-num  { font-size: 13px; color: #999; text-align: center; padding: 0 16px; }
    .row-price { font-size: 15px; font-weight: 700; color: #1a5276; text-align: right; font-variant-numeric: tabular-nums; }
    .history-empty { padding: 32px 20px; text-align: center; color: #ccc; font-size: 14px; }
    .history-empty-icon { font-size: 36px; margin-bottom: 8px; }

    /* ── キャッシュレス画面 ── */
    .cashless-screen {
      display: none; position: fixed; inset: 0;
      background: #f0f2f5;
      flex-direction: column; align-items: center;
      z-index: 200; overflow-y: auto;
    }
    .cashless-screen.show { display: flex; }

    .cl-header { width: 100%; background: #1a5276; padding: 14px 20px; }
    .cl-header-title { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: 1px; }
    .cl-header-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }

    .cl-amount-card {
      width: calc(100% - 40px); max-width: 440px;
      margin: 20px auto 0; background: #fff;
      border-radius: 12px; padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 1px solid #e0e0e0;
    }
    .cl-amount-label { font-size: 12px; color: #999; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .cl-amount-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
    .cl-yen { font-size: 22px; font-weight: 700; color: #1a5276; }
    .cl-amount-num { font-size: 52px; font-weight: 900; color: #1a5276; letter-spacing: -2px; font-variant-numeric: tabular-nums; }
    .cl-amount-items { font-size: 13px; color: #bbb; margin-top: 4px; }

    .cl-touch-card {
      width: calc(100% - 40px); max-width: 440px;
      margin: 16px auto 0; background: #fff;
      border-radius: 12px; padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 1px solid #e0e0e0;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .nfc-area { width: 120px; height: 120px; position: relative; display: flex; align-items: center; justify-content: center; }
    .ripple { position: absolute; border-radius: 50%; border: 2px solid rgba(26,82,118,0.3); animation: rippleOut 2.4s ease-out infinite; }
    .ripple:nth-child(1) { width:50px; height:50px; animation-delay:0s; }
    .ripple:nth-child(2) { width:75px; height:75px; animation-delay:0.6s; }
    .ripple:nth-child(3) { width:100px; height:100px; animation-delay:1.2s; }
    .ripple:nth-child(4) { width:120px; height:120px; animation-delay:1.8s; }
    @keyframes rippleOut { 0% { opacity:0.7; transform:scale(0.6); } 100% { opacity:0; transform:scale(1); } }
    .nfc-center {
      width: 56px; height: 56px; background: #1a5276; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; box-shadow: 0 6px 24px rgba(26,82,118,0.4); z-index: 1;
    }
    .nfc-center.pulse { animation: nfcPulse 0.35s ease; }
    @keyframes nfcPulse { 0% { transform:scale(1); } 50% { transform:scale(1.3); } 100% { transform:scale(1); } }
    .cl-touch-title { font-size: 17px; font-weight: 800; color: #1a1a1a; text-align: center; }
    .cl-touch-sub { font-size: 13px; color: #aaa; text-align: center; line-height: 1.7; }

    /* ── ロゴ選択グリッド ── */
    .cl-pays-card {
      width: calc(100% - 40px); max-width: 440px;
      margin: 16px auto 0; background: #fff;
      border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 1px solid #e0e0e0;
    }
    .cl-pays-label {
      font-size: 11px; color: #bbb; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px;
      text-align: center;
    }
    .cl-pays-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    /* 5番目だけ中央に */
    .cl-pays-grid .pay-logo-btn:nth-child(4) { grid-column: 1; }
    .cl-pays-grid .pay-logo-btn:nth-child(5) { grid-column: 2; }

    .pay-logo-btn {
      background: #f7f8fa;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      padding: 12px 8px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 80px;
    }
    .pay-logo-btn:active { transform: scale(0.95); }
    .pay-logo-btn.selected {
      border-color: #1a5276;
      background: #eaf2fb;
      box-shadow: 0 0 0 1px #1a5276;
    }
    .pay-logo-btn img {
      width: 72px;
      height: 36px;
      object-fit: contain;
    }
    .pay-logo-name {
      font-size: 10px;
      color: #999;
      font-weight: 600;
    }
    .pay-logo-btn.selected .pay-logo-name { color: #1a5276; }

    .cl-cancel-btn {
      width: calc(100% - 40px); max-width: 440px;
      margin: 16px auto 40px;
      background: #fff; border: 1px solid #ddd; color: #999;
      border-radius: 10px; padding: 14px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }

    /* ── 決済完了 ── */
    .cl-success {
      position: fixed; inset: 0; background: rgba(255,255,255,0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s; gap: 16px;
    }
    .cl-success.show { opacity:1; pointer-events:all; }
    .success-circle {
      width: 110px; height: 110px; background: #27ae60; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; color: #fff;
      box-shadow: 0 12px 40px rgba(39,174,96,0.4);
      animation: successPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes successPop { from { transform:scale(0); } to { transform:scale(1); } }
    .success-title { font-size: 26px; font-weight: 900; color: #1a1a1a; }
    .success-amount { font-size: 44px; font-weight: 900; color: #27ae60; font-variant-numeric: tabular-nums; }
    .success-sub { font-size: 14px; color: #aaa; }
    .success-pay-logo {
      height: 36px;
      object-fit: contain;
    }
    .success-receipt { background: #f7f8fa; border: 1px solid #e8e8e8; border-radius: 10px; padding: 12px 24px; font-size: 13px; color: #aaa; }
    .success-back-btn {
      margin-top: 8px; background: #1a5276; color: #fff; border: none;
      border-radius: 12px; padding: 16px 48px;
      font-size: 17px; font-weight: 800; cursor: pointer; letter-spacing: 1px;
      box-shadow: 0 6px 20px rgba(26,82,118,0.3);
    }

    .cam-msg {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:#111; color:#aaa; font-size:14px; gap:12px;
    }
    .cam-msg-icon { font-size:40px; }
    .cam-start-btn {
      background:#f39c12; color:#fff; border:none;
      border-radius:8px; padding:12px 28px;
      font-size:15px; font-weight:800; cursor:pointer; margin-top:8px;
    }
  </style>
</head>
<body>

<div class="header" style="max-width:480px; width:100%;">
  <div class="header-logo">
    <div class="header-logo-icon">🛒</div>
    <div>
      <div class="header-logo-text">SELF <span>CHECKOUT</span></div>
      <div class="header-lane">レーン 3</div>
    </div>
  </div>
  <div class="header-time" id="headerTime">00:00</div>
</div>

<div class="camera-section">
  <div class="camera-header">
    <div class="camera-header-title">スキャンエリア</div>
    <div class="camera-status">
      <div class="status-dot"></div>
      <span id="camStatusText">起動中...</span>
    </div>
  </div>
  <div class="camera-wrap" id="cameraWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="diffCanvas"></canvas>
    <div class="scan-frame">
      <div class="scan-box">
        <div class="corner-bl"></div>
        <div class="corner-br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="brightness-bar-wrap">
      <div class="brightness-label">SENSOR</div>
      <div class="brightness-bar"><div class="brightness-fill" id="brightnessFill"></div></div>
    </div>
    <div class="flash" id="flash"></div>
    <div class="price-pop" id="pricePop"></div>
    <div class="cam-msg" id="camMsg">
      <div class="cam-msg-icon">📷</div>
      <div>カメラを起動してください</div>
      <button class="cam-start-btn" onclick="startCamera()">スキャン開始</button>
    </div>
  </div>
</div>

<div class="main-panel">
  <div class="total-section">
    <div>
      <div class="total-label-text">お支払い合計</div>
      <div class="total-row">
        <div class="total-yen-sign">¥</div>
        <div class="total-amount" id="totalAmount">0</div>
      </div>
      <div class="tax-note">（税込）</div>
    </div>
    <div class="item-badge">
      <div class="item-badge-num" id="itemCount">0</div>
      <div class="item-badge-label">点</div>
    </div>
  </div>

  <div class="checkout-section">
    <button class="cancel-btn" onclick="resetAll()">クリア</button>
    <button class="checkout-btn" onclick="goCheckout()">💳 お会計へ進む</button>
  </div>

  <div class="history-section">
    <div class="history-header">
      <span>商品</span>
      <span>数量</span>
      <span>金額</span>
    </div>
    <div id="historyRows">
      <div class="history-empty">
        <div class="history-empty-icon">🛍</div>
        <div>商品をかざしてください</div>
      </div>
    </div>
  </div>
</div>

<!-- キャッシュレス画面 -->
<div class="cashless-screen" id="cashlessScreen">

  <!-- ① ここにかざしてください（一番上） -->
  <div class="cl-touch-card" style="margin-top:20px;">
    <div class="nfc-area">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="nfc-center" id="nfcIcon">📲</div>
    </div>
    <div class="cl-touch-title">ここにかざしてください</div>
    <div class="cl-touch-sub">
      ICカード・QRコード・スマホ決済<br>すべてご利用いただけます
    </div>
  </div>

  <!-- ② 決済方法を選ぶ -->
  <div class="cl-pays-card">
    <div class="cl-pays-label">決済方法を選ぶ（省略可・ランダム）</div>
    <div class="cl-pays-grid">
      <div class="pay-logo-btn" onclick="selectPay(this,'paypay')">
        <img src="paypay.png" alt="PayPay"/>
        <div class="pay-logo-name">PayPay</div>
      </div>
      <div class="pay-logo-btn" onclick="selectPay(this,'quickpay')">
        <img src="quickpay.png" alt="QUICPay"/>
        <div class="pay-logo-name">QUICPay</div>
      </div>
      <div class="pay-logo-btn" onclick="selectPay(this,'id')">
        <img src="id.png" alt="iD"/>
        <div class="pay-logo-name">iD</div>
      </div>
      <div class="pay-logo-btn" onclick="selectPay(this,'waon')">
        <img src="waon.png" alt="WAON"/>
        <div class="pay-logo-name">WAON</div>
      </div>
      <div class="pay-logo-btn" onclick="selectPay(this,'applepay')">
        <img src="applepay.png" alt="Apple Pay"/>
        <div class="pay-logo-name">Apple Pay</div>
      </div>
    </div>
  </div>

  <!-- ③ お支払い金額 -->
  <div class="cl-amount-card">
    <div class="cl-amount-label">お支払い金額</div>
    <div class="cl-amount-row">
      <div class="cl-yen">¥</div>
      <div class="cl-amount-num" id="clAmount">0</div>
    </div>
    <div class="cl-amount-items" id="clItems">0点のおかいもの・税込</div>
  </div>

  <button class="cl-cancel-btn" onclick="cancelCheckout()">← スキャン画面にもどる</button>
</div>


<!-- 決済完了 -->
<div class="cl-success" id="clSuccess">
  <div class="success-circle">✓</div>
  <div class="success-title">決済が完了しました</div>
  <div class="success-amount" id="successAmount">¥0</div>
  <div class="success-sub" id="successSub">0点のおかいもの</div>
  <img class="success-pay-logo" id="successPayLogo" src="" alt=""/>
  <div class="success-receipt">🧾 領収書は不要です</div>
  <button class="success-back-btn" onclick="resetAll()">🛒 最初にもどる</button>
</div>

<script>
  const PRICES     = [50, 100, 100, 100, 150, 200, 200, 300, 500, 1000];
  const ITEM_NAMES = ['食料品', '惣菜', '加工食品', '生鮮食品'];
  const PAY_TYPES  = ['paypay', 'quickpay', 'id', 'waon', 'applepay'];

  const PAY_INFO = {
    paypay:   { label: 'PayPay',     logo: 'paypay.png',   mp3: 'paypay.mp3'   },
    quickpay: { label: 'QUICPay',    logo: 'quickpay.png', mp3: 'quicpay.mp3'  },
    id:       { label: 'iD',         logo: 'id.png',       mp3: 'id.mp3'       },
    waon:     { label: 'WAON',       logo: 'waon.png',     mp3: 'waon.mp3'     },
    applepay: { label: 'Apple Pay',  logo: 'applepay.png', mp3: 'applepay.mp3' },
  };

  // mp3を事前ロード
  const MP3_SOUNDS = {};
  Object.keys(PAY_INFO).forEach(key => {
    MP3_SOUNDS[key] = new Audio(PAY_INFO[key].mp3);
  });

  let total = 0;
  let itemCount = 0;
  let historyArr = [];
  let cooldown = false;
  let isDark = false;
  let mode = 'scan';
  let selectedPay = null;

  // 時計
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('headerTime').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // 決済方法選択
  function selectPay(el, type) {
    if (selectedPay === type) {
      selectedPay = null;
      document.querySelectorAll('.pay-logo-btn').forEach(c => c.classList.remove('selected'));
    } else {
      selectedPay = type;
      document.querySelectorAll('.pay-logo-btn').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }
  }

  // スキャン音（ピッ）
  function beepScan() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(2800, ctx.currentTime);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.005);
    gain.gain.setValueAtTime(0.5, ctx.currentTime + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.1);
  }

  // キャッシュレス決済音（全てmp3）
  function beepCashless() {
    const type = selectedPay || PAY_TYPES[Math.floor(Math.random() * PAY_TYPES.length)];
    const audio = MP3_SOUNDS[type];
    if (audio) {
      audio.currentTime = 0;
      audio.play();
    }
    return type;
  }

  // カメラ起動（インカメラ）
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width:320, height:240 }
      });
      const video = document.getElementById('video');
      video.srcObject = stream;
      document.getElementById('camMsg').style.display = 'none';
      document.getElementById('camStatusText').textContent = 'スキャン待機中';
      video.addEventListener('play', startDetection);
    } catch(e) {
      alert('カメラの許可をしてください');
    }
  }

  // 明るさ検知
  function startDetection() {
    const video  = document.getElementById('video');
    const canvas = document.getElementById('diffCanvas');
    const ctx    = canvas.getContext('2d');
    canvas.width = 80; canvas.height = 60;

    const DARK_THRESHOLD   = 40;
    const BRIGHT_THRESHOLD = 70;

    function detect() {
      if (video.paused || video.ended) { requestAnimationFrame(detect); return; }
      ctx.drawImage(video, 0, 0, 80, 60);
      const frame = ctx.getImageData(0, 0, 80, 60);
      const data  = frame.data;

      let sum = 0;
      for (let i = 0; i < data.length; i += 4) {
        sum += data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
      }
      const brightness = sum / (data.length / 4);

      const pct  = Math.min(100, (brightness/255)*100);
      const fill = document.getElementById('brightnessFill');
      if (fill) fill.style.width = pct + '%';

      if (!isDark && brightness < DARK_THRESHOLD && !cooldown) {
        isDark = true;
        if (mode === 'scan')          onScanned();
        else if (mode === 'cashless') onCashlessPay();
      }
      if (isDark && brightness > BRIGHT_THRESHOLD) isDark = false;

      requestAnimationFrame(detect);
    }
    detect();
  }

  // スキャン
  function onScanned() {
    cooldown = true;
    beepScan();

    const price = PRICES[Math.floor(Math.random() * PRICES.length)];
    const name  = ITEM_NAMES[Math.floor(Math.random() * ITEM_NAMES.length)];
    total += price;
    itemCount++;
    historyArr.push({ name, price });

    updateTotal();
    showPricePop(price);
    showFlash();
    addHistoryRow(name, price);

    setTimeout(() => { cooldown = false; }, 1500);
  }

  // キャッシュレス決済
  function onCashlessPay() {
    cooldown = true;
    const nfc = document.getElementById('nfcIcon');
    nfc.classList.add('pulse');
    setTimeout(() => nfc.classList.remove('pulse'), 400);

    const usedType = beepCashless();
    const info = PAY_INFO[usedType];

    setTimeout(() => {
      document.getElementById('successAmount').textContent = '¥' + total.toLocaleString();
      document.getElementById('successSub').textContent    = itemCount + '点のおかいもの';
      const logoEl = document.getElementById('successPayLogo');
      logoEl.src = info.logo;
      logoEl.alt = info.label;
      document.getElementById('clSuccess').classList.add('show');
    }, 900);
  }

  // お会計へ
  function goCheckout() {
    if (itemCount === 0) return;
    document.getElementById('clAmount').textContent = total.toLocaleString();
    document.getElementById('clItems').textContent  = itemCount + '点のおかいもの・税込';
    document.getElementById('cashlessScreen').classList.add('show');
    mode = 'cashless';
    isDark = false;
    cooldown = false;
  }

  function cancelCheckout() {
    selectedPay = null;
    document.querySelectorAll('.pay-logo-btn').forEach(c => c.classList.remove('selected'));
    document.getElementById('cashlessScreen').classList.remove('show');
    mode = 'scan';
    isDark = false;
    cooldown = false;
  }

  function resetAll() {
    total = 0; itemCount = 0; historyArr = [];
    selectedPay = null;
    document.querySelectorAll('.pay-logo-btn').forEach(c => c.classList.remove('selected'));
    document.getElementById('totalAmount').textContent = '0';
    document.getElementById('itemCount').textContent   = '0';
    document.getElementById('historyRows').innerHTML   =
      '<div class="history-empty"><div class="history-empty-icon">🛍</div><div>商品をかざしてください</div></div>';
    document.getElementById('cashlessScreen').classList.remove('show');
    document.getElementById('clSuccess').classList.remove('show');
    mode = 'scan'; isDark = false; cooldown = false;
  }

  function updateTotal() {
    const el = document.getElementById('totalAmount');
    el.textContent = total.toLocaleString();
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 200);
    document.getElementById('itemCount').textContent = itemCount;
  }

  function showPricePop(price) {
    const pop = document.getElementById('pricePop');
    pop.textContent = '+¥' + price.toLocaleString();
    pop.className = 'price-pop show';
    setTimeout(() => { pop.className = 'price-pop hide'; }, 800);
    setTimeout(() => { pop.className = 'price-pop'; }, 1100);
  }

  function showFlash() {
    const flash = document.getElementById('flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 150);
  }

  function addHistoryRow(name, price) {
    const wrap = document.getElementById('historyRows');
    if (historyArr.length === 1) wrap.innerHTML = '';
    const row = document.createElement('div');
    row.className = 'history-row';
    row.innerHTML = `
      <div class="row-name">${name}</div>
      <div class="row-num">×1</div>
      <div class="row-price">¥${price.toLocaleString()}</div>
    `;
    wrap.prepend(row);
  }
</script>
</body>
</html>
