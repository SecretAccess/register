<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>こどもレジ</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="こどもレジ"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #fff;
      font-family: -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* ヘッダー */
    .header {
      width: 100%;
      padding: 20px 24px 12px;
      background: linear-gradient(180deg, #16213e 0%, transparent 100%);
      text-align: center;
    }
    .header h1 { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: #fff; }
    .header h1 span { color: #f9ca24; }

    /* カメラ */
    .camera-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: 0 0 32px 32px;
      background: #000;
    }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    canvas#diffCanvas { display: none; }

    .scan-frame {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .scan-box { width: 160px; height: 160px; position: relative; }
    .scan-box::before, .scan-box::after, .scan-box .corner-bl, .scan-box .corner-br {
      content: ''; position: absolute;
      width: 32px; height: 32px;
      border-color: #f9ca24; border-style: solid;
    }
    .scan-box::before { top:0; left:0; border-width:4px 0 0 4px; border-radius:4px 0 0 0; }
    .scan-box::after  { top:0; right:0; border-width:4px 4px 0 0; border-radius:0 4px 0 0; }
    .scan-box .corner-bl { bottom:0; left:0; border-width:0 0 4px 4px; border-radius:0 0 0 4px; }
    .scan-box .corner-br { bottom:0; right:0; border-width:0 4px 4px 0; border-radius:0 0 4px 0; }
    .scan-line {
      position: absolute; left:10%; width:80%; height:2px;
      background: linear-gradient(90deg, transparent, #f9ca24, transparent);
      animation: scanMove 2s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%,100% { top:15%; opacity:0.3; }
      50% { top:85%; opacity:1; }
    }

    .brightness-bar-wrap {
      position: absolute; bottom:16px; left:50%;
      transform: translateX(-50%);
      width:120px; display:flex; flex-direction:column;
      align-items:center; gap:4px; pointer-events:none;
    }
    .brightness-label { font-size:10px; color:rgba(255,255,255,0.6); letter-spacing:1px; }
    .brightness-bar { width:100%; height:4px; background:rgba(255,255,255,0.15); border-radius:4px; overflow:hidden; }
    .brightness-fill { height:100%; background:#f9ca24; border-radius:4px; transition:width 0.1s; width:50%; }

    .flash {
      position:absolute; inset:0;
      background:rgba(249,202,36,0.35);
      opacity:0; border-radius:0 0 32px 32px;
      transition:opacity 0.1s; pointer-events:none;
    }
    .flash.active { opacity:1; }

    .price-pop {
      position:absolute; top:30%; left:50%;
      transform:translateX(-50%) scale(0);
      background:#f9ca24; color:#1a1a2e;
      font-size:28px; font-weight:900;
      padding:10px 24px; border-radius:50px;
      white-space:nowrap; pointer-events:none;
      opacity:0; z-index:10;
      transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    }
    .price-pop.show { transform:translateX(-50%) scale(1); opacity:1; }
    .price-pop.hide { transform:translateX(-50%) scale(0.8) translateY(-30px); opacity:0; }

    /* パネル */
    .panel {
      width:100%; max-width:420px;
      flex:1; padding:20px 20px 32px;
      display:flex; flex-direction:column; gap:16px;
    }
    .total-card {
      background:linear-gradient(135deg,#16213e,#0f3460);
      border-radius:20px; padding:20px 24px;
      display:flex; align-items:center; justify-content:space-between;
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.08);
    }
    .total-label { font-size:13px; color:#aaa; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
    .total-amount { font-size:42px; font-weight:900; color:#f9ca24; letter-spacing:-1px; transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1); }
    .total-amount.bump { transform:scale(1.15); }
    .total-yen { font-size:22px; color:#f9ca24; font-weight:700; }
    .item-count { background:rgba(249,202,36,0.15); border-radius:50px; padding:6px 14px; font-size:13px; color:#f9ca24; font-weight:600; }

    .history-wrap {
      background:rgba(255,255,255,0.04); border-radius:16px;
      padding:14px 16px; min-height:60px; max-height:120px;
      overflow-y:auto; border:1px solid rgba(255,255,255,0.06);
    }
    .history-title { font-size:11px; color:#666; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
    .history-items { display:flex; flex-wrap:wrap; gap:6px; }
    .history-chip {
      background:rgba(249,202,36,0.12);
      border:1px solid rgba(249,202,36,0.25);
      border-radius:50px; padding:4px 12px;
      font-size:13px; color:#f9ca24; font-weight:600;
      animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform:scale(0); opacity:0; }
      to   { transform:scale(1); opacity:1; }
    }

    .checkout-btn {
      width:100%;
      background:linear-gradient(135deg,#f9ca24,#f0932b);
      color:#1a1a2e; border:none; border-radius:18px;
      font-size:20px; font-weight:900; padding:18px;
      cursor:pointer; letter-spacing:2px;
      box-shadow:0 8px 24px rgba(249,202,36,0.35);
      transition:transform 0.1s, box-shadow 0.1s;
    }
    .checkout-btn:active { transform:scale(0.97); }

    /* ── キャッシュレス画面 ── */
    .cashless-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a1a;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      gap: 0;
    }
    .cashless-screen.show { display: flex; }

    /* 上部 金額エリア */
    .cl-top {
      width: 100%;
      padding: 48px 32px 32px;
      text-align: center;
      background: linear-gradient(180deg, #16213e 0%, #0a0a1a 100%);
    }
    .cl-label {
      font-size: 13px;
      color: #666;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .cl-amount {
      font-size: 56px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -2px;
    }
    .cl-amount span { font-size: 28px; color: #aaa; font-weight: 500; }
    .cl-items {
      font-size: 14px;
      color: #555;
      margin-top: 8px;
    }

    /* 中央 NFC/タッチエリア */
    .cl-touch-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      width: 100%;
      padding: 20px;
    }

    /* 波紋アニメーション */
    .nfc-ring {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(58,130,247,0.5);
      animation: rippleOut 2.4s ease-out infinite;
    }
    .ripple:nth-child(1) { width:80px; height:80px; animation-delay:0s; }
    .ripple:nth-child(2) { width:110px; height:110px; animation-delay:0.6s; }
    .ripple:nth-child(3) { width:140px; height:140px; animation-delay:1.2s; }
    .ripple:nth-child(4) { width:160px; height:160px; animation-delay:1.8s; }
    @keyframes rippleOut {
      0%   { opacity:0.8; transform:scale(0.6); }
      100% { opacity:0; transform:scale(1); }
    }

    .nfc-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #3a82f7, #1e40af);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 8px 32px rgba(58,130,247,0.5);
      z-index: 1;
      transition: transform 0.15s;
    }
    .nfc-icon.pulse {
      animation: nfcPulse 0.3s ease;
    }
    @keyframes nfcPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .cl-touch-text {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }
    .cl-touch-sub {
      font-size: 13px;
      color: #555;
      text-align: center;
      line-height: 1.6;
    }

    /* 支払い方法アイコン */
    .cl-payment-icons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 20px;
    }
    .pay-icon {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 12px;
      color: #888;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* 決済完了オーバーレイ */
    .cl-success {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      gap: 20px;
    }
    .cl-success.show { opacity:1; pointer-events:all; }

    .success-circle {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #00c9a7, #0f9e6e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      box-shadow: 0 16px 48px rgba(0,201,167,0.5);
      animation: successPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes successPop {
      from { transform:scale(0); }
      to   { transform:scale(1); }
    }
    .success-title { font-size: 28px; font-weight: 900; color: #fff; }
    .success-sub { font-size: 15px; color: #aaa; }
    .success-amount { font-size: 44px; font-weight: 900; color: #00c9a7; }

    .success-back-btn {
      margin-top: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 14px;
      padding: 14px 36px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
    }

    /* キャンセルボタン */
    .cl-cancel-btn {
      width: calc(100% - 40px);
      margin: 0 20px 40px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #666;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* カメラ起動メッセージ */
    .cam-msg {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#000; color:#aaa; font-size:14px; gap:12px;
      border-radius:0 0 32px 32px;
    }
    .cam-msg-icon { font-size:40px; }
    .cam-start-btn {
      background:#f9ca24; color:#1a1a2e; border:none;
      border-radius:12px; padding:12px 28px;
      font-size:16px; font-weight:800; cursor:pointer; margin-top:8px;
    }
  </style>
</head>
<body>

<!-- ── メイン画面 ── -->
<div class="header">
  <h1>🛒 こども<span>レジ</span></h1>
</div>

<div class="camera-wrap" id="cameraWrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="diffCanvas"></canvas>
  <div class="scan-frame">
    <div class="scan-box">
      <div class="corner-bl"></div>
      <div class="corner-br"></div>
      <div class="scan-line"></div>
    </div>
  </div>
  <div class="brightness-bar-wrap">
    <div class="brightness-label">BRIGHTNESS</div>
    <div class="brightness-bar"><div class="brightness-fill" id="brightnessFill"></div></div>
  </div>
  <div class="flash" id="flash"></div>
  <div class="price-pop" id="pricePop"></div>
  <div class="cam-msg" id="camMsg">
    <div class="cam-msg-icon">📷</div>
    <div>カメラを使って商品をスキャンします</div>
    <button class="cam-start-btn" onclick="startCamera()">カメラをスタート</button>
  </div>
</div>

<div class="panel">
  <div class="total-card">
    <div>
      <div class="total-label">合計金額</div>
      <div style="display:flex;align-items:baseline;gap:4px;">
        <div class="total-amount" id="totalAmount">0</div>
        <div class="total-yen">円</div>
      </div>
    </div>
    <div class="item-count" id="itemCount">0 点</div>
  </div>
  <div class="history-wrap">
    <div class="history-title">スキャン履歴</div>
    <div class="history-items" id="historyItems">
      <span style="color:#444;font-size:13px;">商品をかざしてください</span>
    </div>
  </div>
  <button class="checkout-btn" onclick="goCheckout()">🛍 お会計</button>
</div>

<!-- ── キャッシュレス画面 ── -->
<div class="cashless-screen" id="cashlessScreen">
  <div class="cl-top">
    <div class="cl-label">お支払い金額</div>
    <div class="cl-amount" id="clAmount">0<span> 円</span></div>
    <div class="cl-items" id="clItems">0点のおかいもの</div>
  </div>

  <div class="cl-touch-area">
    <div class="nfc-ring">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="nfc-icon" id="nfcIcon">📲</div>
    </div>
    <div class="cl-touch-text">カードをかざしてください</div>
    <div class="cl-touch-sub">
      ICカード・スマホ決済<br>どちらでもOK
    </div>
  </div>

  <div class="cl-payment-icons">
    <div class="pay-icon">Suica</div>
    <div class="pay-icon">PayPay</div>
    <div class="pay-icon">iD</div>
    <div class="pay-icon">QuicPay</div>
    <div class="pay-icon">VISA</div>
  </div>

  <button class="cl-cancel-btn" onclick="cancelCheckout()">← もどる</button>
</div>

<!-- ── 決済完了 ── -->
<div class="cl-success" id="clSuccess">
  <div class="success-circle">✓</div>
  <div class="success-title">決済完了！</div>
  <div class="success-amount" id="successAmount">0円</div>
  <div class="success-sub">ありがとうございました！</div>
  <button class="success-back-btn" onclick="resetAll()">またかいもの！</button>
</div>

<script>
  const PRICES = [50, 100, 100, 100, 150, 200, 200, 300, 500, 1000];

  let total = 0;
  let itemCount = 0;
  let historyArr = [];
  let cooldown = false;
  let isDark = false;
  let mode = 'scan'; // 'scan' | 'cashless'

  // ── スキャン音（ピッ）──
  function beepScan() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(2800, ctx.currentTime);
    gain.gain.setValueAtTime(0.0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.005);
    gain.gain.setValueAtTime(0.5, ctx.currentTime + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.1);
  }

  // ── キャッシュレス決済音（ピポッ ＋ 完了チャイム）──
  function beepCashless() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function tone(freq, start, dur, vol = 0.4) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.01);
      gain.gain.setValueAtTime(vol, ctx.currentTime + start + dur - 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur);
    }

    // ピポッ（受付音）
    tone(1000, 0,    0.08, 0.3);
    tone(1500, 0.1,  0.08, 0.3);
    // 完了チャイム（ドミソ）
    tone(523,  0.28, 0.18, 0.35);
    tone(659,  0.42, 0.18, 0.35);
    tone(784,  0.56, 0.28, 0.4);
  }

  // ── カメラ起動（インカメラ）──
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: 320, height: 240 }
      });
      const video = document.getElementById('video');
      video.srcObject = stream;
      document.getElementById('camMsg').style.display = 'none';
      video.addEventListener('play', startDetection);
    } catch(e) {
      alert('カメラの許可をしてください');
    }
  }

  // ── 明るさ検知 ──
  function startDetection() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('diffCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 80;
    canvas.height = 60;

    const DARK_THRESHOLD   = 40;
    const BRIGHT_THRESHOLD = 70;

    function detect() {
      if (video.paused || video.ended) { requestAnimationFrame(detect); return; }

      ctx.drawImage(video, 0, 0, 80, 60);
      const frame = ctx.getImageData(0, 0, 80, 60);
      const data  = frame.data;

      let sum = 0;
      for (let i = 0; i < data.length; i += 4) {
        sum += data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
      }
      const brightness = sum / (data.length / 4);

      // インジケーター（スキャン画面のみ表示）
      const pct = Math.min(100, (brightness / 255) * 100);
      const fill = document.getElementById('brightnessFill');
      if (fill) fill.style.width = pct + '%';

      if (!isDark && brightness < DARK_THRESHOLD && !cooldown) {
        isDark = true;
        if (mode === 'scan') {
          onScanned();
        } else if (mode === 'cashless') {
          onCashlessPay();
        }
      }
      if (isDark && brightness > BRIGHT_THRESHOLD) {
        isDark = false;
      }

      requestAnimationFrame(detect);
    }
    detect();
  }

  // ── スキャン時 ──
  function onScanned() {
    cooldown = true;
    beepScan();

    const price = PRICES[Math.floor(Math.random() * PRICES.length)];
    total += price;
    itemCount++;
    historyArr.push(price);

    updateTotal();
    showPricePop(price);
    showFlash();
    addHistoryChip(price);

    setTimeout(() => { cooldown = false; }, 1500);
  }

  // ── キャッシュレス決済時 ──
  function onCashlessPay() {
    cooldown = true;

    // NFCアイコン演出
    const nfc = document.getElementById('nfcIcon');
    nfc.classList.add('pulse');
    setTimeout(() => nfc.classList.remove('pulse'), 400);

    beepCashless();

    // 少し待って完了画面
    setTimeout(() => {
      document.getElementById('successAmount').textContent =
        total.toLocaleString() + '円';
      document.getElementById('clSuccess').classList.add('show');
    }, 900);
  }

  // ── お会計ボタン ──
  function goCheckout() {
    if (itemCount === 0) return;
    document.getElementById('clAmount').innerHTML =
      total.toLocaleString() + '<span> 円</span>';
    document.getElementById('clItems').textContent =
      itemCount + '点のおかいもの';
    document.getElementById('cashlessScreen').classList.add('show');
    mode = 'cashless';
    isDark = false;
    cooldown = false;
  }

  // ── もどる ──
  function cancelCheckout() {
    document.getElementById('cashlessScreen').classList.remove('show');
    mode = 'scan';
    isDark = false;
    cooldown = false;
  }

  // ── リセット ──
  function resetAll() {
    total = 0; itemCount = 0; historyArr = [];
    document.getElementById('totalAmount').textContent = '0';
    document.getElementById('itemCount').textContent = '0 点';
    document.getElementById('historyItems').innerHTML =
      '<span style="color:#444;font-size:13px;">商品をかざしてください</span>';
    document.getElementById('cashlessScreen').classList.remove('show');
    document.getElementById('clSuccess').classList.remove('show');
    mode = 'scan';
    isDark = false;
    cooldown = false;
  }

  function updateTotal() {
    const el = document.getElementById('totalAmount');
    el.textContent = total.toLocaleString();
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 200);
    document.getElementById('itemCount').textContent = itemCount + ' 点';
  }

  function showPricePop(price) {
    const pop = document.getElementById('pricePop');
    pop.textContent = '+' + price.toLocaleString() + '円';
    pop.className = 'price-pop show';
    setTimeout(() => { pop.className = 'price-pop hide'; }, 800);
    setTimeout(() => { pop.className = 'price-pop'; }, 1100);
  }

  function showFlash() {
    const flash = document.getElementById('flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 200);
  }

  function addHistoryChip(price) {
    const wrap = document.getElementById('historyItems');
    if (historyArr.length === 1) wrap.innerHTML = '';
    const chip = document.createElement('div');
    chip.className = 'history-chip';
    chip.textContent = price.toLocaleString() + '円';
    wrap.appendChild(chip);
    wrap.scrollTop = wrap.scrollHeight;
  }
</script>
</body>
</html>
